---
- name: Provision dev VM
  hosts: all
  become: true
  vars_files:
    - vars/packages.yml
    - vars/helix_github_binaries.yml
    - vars/gh.yml
    - vars/asdf_plugins.yml

  pre_tasks:
    - name: Verify GitHub PAT secret file exists on controller
      ansible.builtin.stat:
        path: ".secret/gh_pat"
      register: gh_pat_file
      delegate_to: localhost
      become: false
      tags:
        - always

    - name: Fail early if GitHub PAT secret is missing
      ansible.builtin.fail:
        msg: >
          The file .secret/gh_pat is missing!
          Please create it with your GitHub Personal Access Token.
          Example: echo "ghp_your_token_here" > .secret/gh_pat
      when: not gh_pat_file.stat.exists
      tags:
        - always

    # ── Optional personal overrides ────────────────────────────────────────
    # If .secret/personal.yml exists on the controller, load it to override
    # generic defaults (e.g. git_user_name, git_user_email) from vars/gh.yml.
    # See README.md § "Personal and company overrides" for details.

    - name: Check for personal variable overrides
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/.secret/personal.yml"
      register: personal_overrides_file
      delegate_to: localhost
      become: false
      tags:
        - always

    - name: Load personal variable overrides if available
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/.secret/personal.yml"
      when: personal_overrides_file.stat.exists
      tags:
        - always

  tasks:
    - name: Ping my hosts
      ansible.builtin.ping:

    - name: Gather facts
      ansible.builtin.gather_facts:

    - name: Install favorite packages
      community.general.zypper:
        name: "{{ favorite_packages }}"
        state: present
      tags:
        - packages

    - name: Update all packages to the latest version
      community.general.zypper:
        name: "*"
        state: latest
        update_cache: true
      tags:
        - update

    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'
      tags:
        - ssh_keys

    - name: Upload private SSH keys for jumphost access
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/home/{{ ansible_user }}/.ssh/{{ item | basename }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      with_items: "{{ private_ssh_keys_to_upload }}"
      tags:
        - ssh_keys

    - name: Set default shell to zsh for {{ ansible_user }}
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /usr/bin/zsh
      tags:
        - shell

    - name: Ensure ~/.config directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.config"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags:
        - dotfiles

    - name: Deploy starship.toml
      ansible.builtin.copy:
        src: files/starship.toml
        dest: "/home/{{ ansible_user }}/.config/starship.toml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - dotfiles

    - name: Deploy .zshrc
      ansible.builtin.template:
        src: templates/zshrc.j2
        dest: "/home/{{ ansible_user }}/.zshrc"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - dotfiles

    # ── Atuin: local-only shell history ────────────────────────────────────────
    # No sync account; history is bootstrapped from the controller's zsh history.
    # Re-running is safe: atuin import deduplicates entries.

    - name: Ensure atuin config directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.config/atuin"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags:
        - atuin

    - name: Deploy atuin config (sync disabled)
      ansible.builtin.copy:
        src: files/atuin_config.toml
        dest: "/home/{{ ansible_user }}/.config/atuin/config.toml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - atuin

    - name: Upload controller zsh history for atuin import
      ansible.builtin.copy:
        src: "{{ local_zsh_history_file | default('~/.zsh_history') }}"
        dest: "/home/{{ ansible_user }}/.zsh_history_import"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      tags:
        - atuin

    - name: Import controller zsh history into atuin
      ansible.builtin.command:
        cmd: atuin import zsh
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
        HISTFILE: "/home/{{ ansible_user }}/.zsh_history_import"
      changed_when: true
      tags:
        - atuin

    - name: Remove imported history staging file
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.zsh_history_import"
        state: absent
      tags:
        - atuin

    # ── Helix editor: language server & tool support ───────────────────────────
    # Brings `hx --health` on the remote VM to parity with the local setup.
    # Install order: zypper packages → GitHub binaries → rustup → asdf (plugins + versions) → npm LSPs → config
    # Note: zig (formatter) is managed via asdf, not zypper.

    - name: Install Helix LSP dependencies via zypper
      community.general.zypper:
        name: "{{ helix_zypper_packages }}"
        state: present
      tags:
        - helix

    # ── ~/bin — home for standalone LSP binaries ───────────────────────────────

    - name: Ensure ~/bin directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/bin"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags:
        - helix

    # ── GitHub release binaries: Idempotent Installation ───────────────────────
    # Version sentinels in ~/bin avoid re-downloading existing tools.

    - name: Read installed version sentinels for GitHub binaries
      ansible.builtin.command:
        cmd: "cat /home/{{ ansible_user }}/bin/.{{ item.dest }}.version"
      register: helix_version_check
      loop: "{{ helix_github_binaries }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ ansible_user }}"
      tags:
        - helix

    - name: Identify GitHub binaries that need install or update
      ansible.builtin.set_fact:
        helix_binaries_to_update: >-
          {{ (helix_binaries_to_update | default([])) +
             ([] if (helix_version_check.results[item | int].rc == 0 and
                     helix_version_check.results[item | int].stdout.strip()
                     == helix_github_binaries[item | int].version)
                 else [helix_github_binaries[item | int]]) }}
      loop: "{{ range(helix_github_binaries | length) | list }}"
      loop_control:
        label: "{{ helix_github_binaries[item | int].name }}"
      tags:
        - helix

    # ── GitHub release binaries (direct, no archive) ───────────────────────────

    - name: Download standalone LSP binaries from GitHub
      ansible.builtin.get_url:
        url: "{{ item.url }}"
        dest: "/home/{{ ansible_user }}/bin/{{ item.dest }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
        force: true
      loop: "{{ helix_binaries_to_update | selectattr('archive', 'equalto', false) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - helix

    # ── GitHub release binaries (archives: zip / vsix) ─────────────────────────
    # Each archive is downloaded to /tmp, extracted there, then the single binary
    # is copied to ~/bin.

    - name: Download archived LSP releases to /tmp
      ansible.builtin.get_url:
        url: "{{ item.url }}"
        dest: "/tmp/helix_{{ item.name }}_archive"
        mode: '0644'
        force: true
      loop: "{{ helix_binaries_to_update | selectattr('archive', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - helix

    - name: Create per-binary extraction directories in /tmp
      ansible.builtin.file:
        path: "/tmp/helix_{{ item.name }}_extract"
        state: directory
        mode: '0755'
      loop: "{{ helix_binaries_to_update | selectattr('archive', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - helix

    - name: Extract archived LSP releases
      ansible.builtin.unarchive:
        src: "/tmp/helix_{{ item.name }}_archive"
        dest: "/tmp/helix_{{ item.name }}_extract"
        remote_src: true
      loop: "{{ helix_binaries_to_update | selectattr('archive', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - helix

    - name: Install extracted LSP binaries to ~/bin
      ansible.builtin.copy:
        src: "/tmp/helix_{{ item.name }}_extract/{{ item.archive_path }}"
        dest: "/home/{{ ansible_user }}/bin/{{ item.dest }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
        remote_src: true
      loop: "{{ helix_binaries_to_update | selectattr('archive', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - helix

    - name: Cleanup temporary archive files
      ansible.builtin.file:
        path: "/tmp/helix_{{ item.name }}_archive"
        state: absent
      loop: "{{ helix_binaries_to_update | selectattr('archive', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - helix

    - name: Cleanup temporary extraction directories
      ansible.builtin.file:
        path: "/tmp/helix_{{ item.name }}_extract"
        state: absent
      loop: "{{ helix_binaries_to_update | selectattr('archive', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - helix

    - name: Record installed version for GitHub binaries
      ansible.builtin.copy:
        content: "{{ item.version }}"
        dest: "/home/{{ ansible_user }}/bin/.{{ item.dest }}.version"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      loop: "{{ helix_binaries_to_update }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - helix

    # ── rust-analyzer via rustup ───────────────────────────────────────────────

    - name: Install stable Rust toolchain via rustup
      ansible.builtin.command:
        cmd: rustup toolchain install stable --no-self-update
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
        RUSTUP_HOME: "/home/{{ ansible_user }}/.rustup"
        CARGO_HOME: "/home/{{ ansible_user }}/.cargo"
      register: rustup_toolchain
      changed_when: "'installed' in rustup_toolchain.stdout"
      tags:
        - helix

    - name: Add rust-analyzer component via rustup
      ansible.builtin.command:
        cmd: rustup component add rust-analyzer
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
        RUSTUP_HOME: "/home/{{ ansible_user }}/.rustup"
        CARGO_HOME: "/home/{{ ansible_user }}/.cargo"
      register: rustup_component
      changed_when: "'installing' in rustup_component.stdout"
      tags:
        - helix

    # ── asdf: plugin management ────────────────────────────────────────────────
    # asdf is installed via zypper (see favorite_packages).
    # Plugin list and versions are driven by vars/asdf_plugins.yml.
    # Each plugin entry supports multiple versions; one version per plugin is
    # flagged global: true and set as the home-wide default via `asdf set -u`.

    - name: Add asdf plugins
      ansible.builtin.command:
        cmd: "asdf plugin add {{ item.name }} {{ item.url }}"
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
        ASDF_DATA_DIR: "/home/{{ ansible_user }}/.asdf"
        PATH: "/home/{{ ansible_user }}/.asdf/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      loop: "{{ asdf_plugins }}"
      loop_control:
        label: "{{ item.name }}"
      register: asdf_plugin_add
      changed_when: asdf_plugin_add.rc == 0
      failed_when: asdf_plugin_add.rc != 0 and 'already added' not in asdf_plugin_add.stderr
      tags:
        - asdf

    - name: Install asdf plugin versions
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          if ! asdf list {{ item.0.name }} 2>/dev/null | grep -qE '{{ item.1.installed_version_pattern }}'; then
            asdf install {{ item.0.name }} {{ item.1.version }}
          else
            echo "already installed"
          fi
        executable: /bin/bash
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
        ASDF_DATA_DIR: "/home/{{ ansible_user }}/.asdf"
        PATH: "/home/{{ ansible_user }}/.asdf/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      loop: "{{ asdf_plugins | subelements('versions') }}"
      loop_control:
        label: "{{ item.0.name }} {{ item.1.version }}"
      register: asdf_install
      changed_when: "'already installed' not in asdf_install.stdout"
      tags:
        - asdf

    - name: Set asdf global default versions
      ansible.builtin.command:
        cmd: "asdf set -u {{ item.0.name }} {{ item.1.version }}"
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
        ASDF_DATA_DIR: "/home/{{ ansible_user }}/.asdf"
        PATH: "/home/{{ ansible_user }}/.asdf/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      loop: "{{ asdf_plugins | subelements('versions') }}"
      loop_control:
        label: "{{ item.0.name }} {{ item.1.version }}"
      when: item.1.global | default(false)
      changed_when: false
      tags:
        - asdf

    # ── npm-based LSPs via asdf-managed nodejs ─────────────────────────────────
    # Depends on the asdf section above having set up nodejs.
    # After this block, bash-language-server, yaml-language-server, prettier, and
    # ansible-language-server will be available as shims in ~/.asdf/shims/.

    - name: Install npm-based LSPs
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          npm install -g {{ helix_npm_packages | join(' ') }}
          asdf reshim nodejs
        executable: /bin/bash
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
        ASDF_DATA_DIR: "/home/{{ ansible_user }}/.asdf"
        PATH: "/home/{{ ansible_user }}/.asdf/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      register: npm_lsp_install
      changed_when: npm_lsp_install.rc == 0
      tags:
        - helix

    # ── Helix configuration files ──────────────────────────────────────────────

    - name: Ensure ~/.config/helix directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.config/helix"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags:
        - helix

    - name: Deploy Helix editor config
      ansible.builtin.copy:
        src: files/helix_config.toml
        dest: "/home/{{ ansible_user }}/.config/helix/config.toml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - helix

    - name: Deploy Helix language server config
      ansible.builtin.copy:
        src: files/helix_languages.toml
        dest: "/home/{{ ansible_user }}/.config/helix/languages.toml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - helix

    # ── gh CLI: authentication, configuration, extensions ─────────────────────
    # After this block the user can SSH into the machine and use gh immediately
    # without any manual login or browser interaction.
    #
    # Prerequisites on the Ansible controller:
    #   .secret/gh_pat  — plain text GitHub PAT (gitignored, mode 0600)
    #                     Required scopes: repo, read:org, gist
    #
    # Authentication strategy: gh auth login --with-token --insecure-storage
    #   - Token is read from .secret/gh_pat on the controller via lookup('file')
    #   - gh validates the token against the GitHub API at deploy time
    #   - Token is stored in plain text in ~/.config/gh/hosts.yml (mode 0600)
    #     because the system keyring is unavailable in headless SSH sessions
    #   - no_log: true prevents the token from appearing in Ansible output

    - name: Ensure ~/.config/gh directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.config/gh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags:
        - gh

    - name: Deploy gh config.yml
      ansible.builtin.template:
        src: templates/gh_config.yml.j2
        dest: "/home/{{ ansible_user }}/.config/gh/config.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - gh

    - name: Authenticate gh with GitHub (headless, PAT via stdin)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          echo '{{ gh_pat }}' | gh auth login --with-token --git-protocol https --insecure-storage
        executable: /bin/bash
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
      no_log: true
      changed_when: false
      tags:
        - gh

    - name: Configure gh as git credential helper (gh auth setup-git)
      ansible.builtin.command:
        cmd: gh auth setup-git
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
      changed_when: false
      tags:
        - gh

    # ── gh extensions ──────────────────────────────────────────────────────────
    # Idempotent: the creates: argument skips install if the extension directory
    # already exists under ~/.local/share/gh/extensions/gh-<name>/.

    - name: Install gh extensions
      ansible.builtin.command:
        cmd: "gh extension install {{ item.repo }}"
      args:
        creates: "/home/{{ ansible_user }}/.local/share/gh/extensions/gh-{{ item.name }}"
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
      loop: "{{ gh_extensions }}"
      loop_control:
        label: "{{ item.repo }}"
      tags:
        - gh
        - gh_extensions

    - name: Upgrade all gh extensions to latest
      ansible.builtin.command:
        cmd: gh extension upgrade --all
      become: true
      become_user: "{{ ansible_user }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
      register: gh_ext_upgrade
      changed_when: "'Upgraded' in gh_ext_upgrade.stdout"
      tags:
        - gh
        - gh_extensions

    - name: Ensure ~/.config/gh-dash directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.config/gh-dash"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags:
        - gh
        - gh_extensions

    - name: Check for personal gh-dash config override
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/.secret/gh_dash_config.yml"
      register: gh_dash_override_file
      delegate_to: localhost
      become: false
      tags:
        - gh
        - gh_extensions

    - name: Deploy gh-dash config.yml
      ansible.builtin.copy:
        src: "{{ (gh_dash_override_file.stat.exists) | ternary('.secret/gh_dash_config.yml', 'files/gh_dash_config.yml') }}"
        dest: "/home/{{ ansible_user }}/.config/gh-dash/config.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - gh
        - gh_extensions

    # ── git global configuration ───────────────────────────────────────────────
    # Managed via community.general.git_config (idempotent: only writes when
    # the current value differs from the desired value).

    - name: Configure global git settings
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      become: true
      become_user: "{{ ansible_user }}"
      loop:
        - {name: user.name, value: "{{ git_user_name }}"}
        - {name: user.email, value: "{{ git_user_email }}"}
        - {name: core.editor, value: "{{ git_editor }}"}
        - {name: init.defaultBranch, value: "{{ git_default_branch }}"}
        # - { name: pull.rebase, value: "true" }
        # - { name: push.autoSetupRemote, value: "true" }
        # - { name: fetch.prune, value: "true" }
        # - { name: diff.algorithm, value: histogram }
        # - { name: rebase.autoSquash, value: "true" }
        # - { name: rerere.enabled, value: "true" }
      loop_control:
        label: "{{ item.name }}"
      tags:
        - gh
        - git_config

    # ── GPG commit signing (optional) ─────────────────────────────────────────
    # Enabled when git_signing_key is non-empty (set in .secret/personal.yml).
    # The private key is sourced from .secret/gpg_private_key.asc (gitignored).
    # It is copied to a temp path on the VM, imported, then immediately deleted.
    # block/always guarantees the temp file is removed even if import fails.
    #
    # gpg-agent is configured for loopback pinentry so commits can be signed
    # over SSH without a graphical pinentry dialog; the passphrase is cached by
    # the agent (default-cache-ttl: 8 h, max-cache-ttl: 24 h).

    - name: Check for GPG private key file on controller
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/.secret/gpg_private_key.asc"
      register: gpg_key_file
      delegate_to: localhost
      become: false
      when: git_signing_key != ""
      tags:
        - gpg
        - git_config

    - name: Ensure ~/.gnupg directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.gnupg"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"
      when: git_signing_key != ""
      tags:
        - gpg
        - git_config

    - name: Import GPG private key and set ultimate trust
      when: git_signing_key != "" and (gpg_key_file is defined) and gpg_key_file.stat.exists
      tags:
        - gpg
        - git_config
      block:
        - name: Copy GPG private key to remote temp location
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/.secret/gpg_private_key.asc"
            dest: /tmp/.gpg_import_key.asc
            owner: "{{ ansible_user }}"
            mode: "0600"
          no_log: true

        - name: Import GPG private key into keyring
          ansible.builtin.command:
            cmd: gpg --batch --import /tmp/.gpg_import_key.asc
          become: true
          become_user: "{{ ansible_user }}"
          environment:
            HOME: "/home/{{ ansible_user }}"
          register: gpg_import_result
          changed_when: >-
            'secret key imported' in (gpg_import_result.stderr | default('')) or
            'secret keys imported' in (gpg_import_result.stderr | default(''))

        - name: Set GPG key trust to ultimate
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              gpg --with-colons --fingerprint '{{ git_signing_key }}' 2>/dev/null \
                | awk -F: '/^fpr/{print $10; exit}' \
                | sed 's/$/:6:/' \
                | gpg --batch --import-ownertrust
            executable: /bin/bash
          become: true
          become_user: "{{ ansible_user }}"
          environment:
            HOME: "/home/{{ ansible_user }}"
          changed_when: false

      always:
        - name: Remove GPG private key from remote temp location
          ansible.builtin.file:
            path: /tmp/.gpg_import_key.asc
            state: absent

    - name: Configure gpg-agent for loopback pinentry
      ansible.builtin.copy:
        content: |
          allow-loopback-pinentry
          default-cache-ttl 28800
          max-cache-ttl 86400
        dest: "/home/{{ ansible_user }}/.gnupg/gpg-agent.conf"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      when: git_signing_key != ""
      tags:
        - gpg
        - git_config

    - name: Configure gpg for loopback pinentry
      ansible.builtin.copy:
        content: |
          pinentry-mode loopback
        dest: "/home/{{ ansible_user }}/.gnupg/gpg.conf"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      when: git_signing_key != ""
      tags:
        - gpg
        - git_config

    - name: Configure global git signing settings
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      become: true
      become_user: "{{ ansible_user }}"
      loop:
        - {name: user.signingkey, value: "{{ git_signing_key }}"}
        - {name: commit.gpgsign, value: "{{ git_gpg_sign }}"}
      when: git_signing_key != ""
      loop_control:
        label: "{{ item.name }}"
      tags:
        - gpg
        - git_config

    # ── tmux configuration ─────────────────────────────────────────────────────
    # TPM and plugins are cloned via ansible.builtin.git (idempotent; avoids
    # running a headless TPM install script).  The catppuccin/tmux repo uses the
    # last path segment as the clone directory name ("tmux"), which is what TPM
    # expects when the plugin is declared as 'catppuccin/tmux' in tmux.conf.

    - name: Clone TPM (Tmux Plugin Manager)
      ansible.builtin.git:
        repo: https://github.com/tmux-plugins/tpm.git
        dest: "/home/{{ ansible_user }}/.tmux/plugins/tpm"
        version: master
        update: true
      become: true
      become_user: "{{ ansible_user }}"
      tags:
        - tmux

    - name: Clone tmux-sensible plugin
      ansible.builtin.git:
        repo: https://github.com/tmux-plugins/tmux-sensible.git
        dest: "/home/{{ ansible_user }}/.tmux/plugins/tmux-sensible"
        version: master
        update: true
      become: true
      become_user: "{{ ansible_user }}"
      tags:
        - tmux

    - name: Clone catppuccin/tmux plugin
      ansible.builtin.git:
        repo: https://github.com/catppuccin/tmux.git
        dest: "/home/{{ ansible_user }}/.tmux/plugins/tmux"
        version: main
        update: true
      become: true
      become_user: "{{ ansible_user }}"
      tags:
        - tmux

    - name: Deploy tmux configuration
      ansible.builtin.copy:
        src: files/tmux.conf
        dest: "/home/{{ ansible_user }}/.tmux.conf"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      become: true
      become_user: "{{ ansible_user }}"
      tags:
        - tmux
