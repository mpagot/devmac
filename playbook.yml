---
- name: Provision dev VM
  hosts: all
  become: true
  vars_files:
    - vars/packages.yml
  tasks:
    - name: Ping my hosts
      ansible.builtin.ping:

    - name: Gather facts
      ansible.builtin.gather_facts:

    - name: Install favorite packages
      community.general.zypper:
        name: "{{ favorite_packages }}"
        state: present
      tags:
        - packages

    - name: Update all packages to the latest version
      community.general.zypper:
        name: "*"
        state: latest
        update_cache: true
      tags:
        - update

    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'
      tags:
        - ssh_keys

    - name: Upload private SSH keys for jumphost access
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/home/{{ ansible_user }}/.ssh/{{ item | basename }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      with_items: "{{ private_ssh_keys_to_upload }}"
      tags:
        - ssh_keys

    - name: Set default shell to zsh for {{ ansible_user }}
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /usr/bin/zsh
      tags:
        - shell

    - name: Ensure ~/.config directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.config"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags:
        - dotfiles

    - name: Deploy starship.toml
      ansible.builtin.copy:
        src: files/starship.toml
        dest: "/home/{{ ansible_user }}/.config/starship.toml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - dotfiles

    - name: Deploy .zshrc
      ansible.builtin.copy:
        src: files/zshrc
        dest: "/home/{{ ansible_user }}/.zshrc"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags:
        - dotfiles
