---
# ── GitHub release binaries ────────────────────────────────────────────────────
# Tools not available in the openSUSE Tumbleweed repos are fetched from their
# respective GitHub (or HashiCorp) releases and placed in ~/bin.
#
# Each entry describes how to obtain the binary:
#   url          — download URL for the release asset
#   dest         — filename under ~/bin/ once installed
#   version      — version string to gate installation and updates
#   archive      — true if the asset is a zip/tar/vsix that must be unpacked first
#   archive_path — (archive: true) path of the binary inside the archive

# ── Helix editor: language server & tool support ──────────────────────────────

helix_github_binaries:

  # marksman — Markdown LSP (single binary, no archive)
  - name: marksman
    version: "2026-02-08"
    url: "https://github.com/artempyanykh/marksman/releases/download/2026-02-08/marksman-linux-x64"
    dest: marksman
    archive: false

  # vale-ls — prose LSP for HTML and Perl (zip with single binary at root)
  - name: vale-ls
    version: "v0.4.0"
    url: "https://github.com/vale-cli/vale-ls/releases/download/v0.4.0/vale-ls-x86_64-unknown-linux-gnu.zip"
    dest: vale-ls
    archive: true
    archive_path: vale-ls

  # perlnavigator — Perl LSP (zip with binary in a subdirectory)
  - name: perlnavigator
    version: "v0.8.20"
    url: "https://github.com/bscan/PerlNavigator/releases/download/v0.8.20/perlnavigator-linux-x86_64.zip"
    dest: perlnavigator
    archive: true
    archive_path: perlnavigator-linux-x86_64/perlnavigator

  # terraform-ls — HCL / Terraform LSP (HashiCorp zip with single binary at root)
  - name: terraform-ls
    version: "0.38.6"
    url: "https://releases.hashicorp.com/terraform-ls/0.38.6/terraform-ls_0.38.6_linux_amd64.zip"
    dest: terraform-ls
    archive: true
    archive_path: terraform-ls

  # codelldb — debug adapter for Zig (vsix = zip; binary at extension/adapter/codelldb)
  - name: codelldb
    version: "v1.12.1"
    url: "https://github.com/vadimcn/codelldb/releases/download/v1.12.1/codelldb-linux-x64.vsix"
    dest: codelldb
    archive: true
    archive_path: extension/adapter/codelldb

# ── AI / Code-Assist tools ─────────────────────────────────────────────────────
# gemini-cli is installed via zypper (see vars/packages.yml → favorite_packages).
# opencode and copilot use GitHub release binaries with the same version-sentinel
# pattern as helix_github_binaries above.
# claude-code is installed via the official curl | bash installer (see playbook).

code_assist_github_binaries:

  # opencode — AI coding assistant (Bun-compiled standalone binary)
  - name: opencode
    version: "v1.4.6"
    url: "https://github.com/anomalyco/opencode/releases/download/v1.4.6/opencode-linux-x64.tar.gz"
    dest: opencode
    archive: true
    archive_path: opencode

  # copilot — GitHub Copilot CLI (standalone binary, requires active Copilot subscription)
  - name: copilot
    version: "v1.0.27"
    url: "https://github.com/github/copilot-cli/releases/download/v1.0.27/copilot-linux-x64.tar.gz"
    dest: copilot
    archive: true
    archive_path: copilot

# ── Pi: terminal AI coding agent (full-directory install) ─────────────────────
# pi bundles a binary, photon_rs_bg.wasm, themes, and export-html assets that
# must be co-located with the executable at runtime.
# Install layout:  ~/.local/opt/pi/  (full archive extract)
#                  ~/bin/pi           (symlink → ~/.local/opt/pi/pi)
# Handled by dedicated tasks in the playbook (not the code_assist loop).

pi_binary:
  name: pi
  version: "v0.67.3"
  url: "https://github.com/badlogic/pi-mono/releases/download/v0.67.3/pi-linux-x64.tar.gz"
