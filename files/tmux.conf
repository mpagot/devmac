# Reload configuration file
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes preserving the current directory
bind | split-window -hc "#{pane_current_path}"
bind _ split-window -vc "#{pane_current_path}"

# Windows numbered from 1; gaps close automatically when a window is killed
set -g base-index 1
set-option -g renumber-windows on

# Status bar at the top
set-option -g status-position top

# Helix / editor compatibility (recommended by helix :checkhealth)
set-option -sg escape-time 10
set-option -g default-terminal "screen-256color"
set-option -sa terminal-features ',*:RGB'
set-option -g focus-events on

# Pane navigation with Ctrl+Arrow (no prefix required)
bind -n C-left select-pane -L
bind -n C-down select-pane -D
bind -n C-up select-pane -U
bind -n C-right select-pane -R

# ── Plugins ────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

# Catppuccin theme: mocha flavour with custom window separators
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_icon_window_zoom "󰁌"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
