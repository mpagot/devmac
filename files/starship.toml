"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

# ── Prompt Format ──────────────────────────────────────────────────────────────
# Two-line prompt: context on line 1, character on line 2
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$rust\
$golang\
$nodejs\
$cmd_duration\
$line_break\
$character"""

# ── Directory ──────────────────────────────────────────────────────────────────
[directory]
style = "bold cyan"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 󰌾"

# ── Git ────────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

# ── Languages ─────────────────────────────────────────────────────────────────
[python]
symbol = " "
style = "bold yellow"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "setup.py", "Pipfile"]

[rust]
symbol = " "
style = "bold red"

[golang]
symbol = " "

[nodejs]
symbol = " "

# ── Command Duration ───────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000
format = "[⏱ $duration]($style) "
style = "bold yellow"

# ── Prompt Character ───────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ── Username / Hostname ────────────────────────────────────────────────────────
# Only show user@host when in an SSH session or as root
[username]
show_always = false
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style)[@](dimmed white)"

[hostname]
ssh_only = true
style = "bold blue"
format = "[$ssh_symbol$hostname]($style) "
ssh_symbol = " "

# ── Disabled modules ───────────────────────────────────────────────────────────
[package]
disabled = true
